<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bee Swarm Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1e1e1e; color: #ffffff; padding-top: 20px; }
        .card { background-color: #2d2d2d; border: none; margin-bottom: 20px; }
        .form-label { font-weight: bold; }
        .form-control, .form-select { background-color: #3d3d3d; color: white; border: 1px solid #555; }
        .form-control:focus { background-color: #4d4d4d; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center text-primary mb-4">Bee Swarm Remote Control</h2>
    
    <div class="card p-3">
        <h4>Cấu hình GitHub API</h4>
        <div class="mb-3">
            <label class="form-label">GitHub Token (Bảo mật)</label>
            <input type="password" id="ghToken" class="form-control" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Kho lưu trữ (Ví dụ: ManhHero193/manhherohub)</label>
                <input type="text" id="ghRepo" class="form-control" value="ManhHero193/manhherohub">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Đường dẫn File</label>
                <input type="text" id="ghPath" class="form-control" value="ConfigBss.loncho">
            </div>
        </div>
        <button class="btn btn-info w-100" onclick="fetchConfig()">Tải Cấu Hình Hiện Tại</button>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-3">
            <h4 class="text-success">Chức năng chính (States)</h4>
            <div id="statesContainer" class="row"></div>
        </div>

        <div class="card p-3">
            <h4 class="text-warning">Thời gian (Times)</h4>
            <div id="timesContainer" class="row"></div>
        </div>

        <button class="btn btn-success w-100 btn-lg mb-5" onclick="saveConfig()">LƯU & ĐỒNG BỘ LÊN GITHUB</button>
    </div>
</div>

<script>
    let fileSha = ""; 
    let configData = {};

    // Base64 Encode/Decode hỗ trợ Tiếng Việt
    const b64DecodeUnicode = str => decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    const b64EncodeUnicode = str => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));

    async function fetchConfig() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const path = document.getElementById('ghPath').value;

        if (!token || !repo || !path) return alert("Vui lòng nhập đủ Token, Repo và Path!");

        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        
        try {
            const response = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if (!response.ok) throw new Error("Lấy dữ liệu thất bại. Kiểm tra lại Token hoặc Repo.");
            
            const data = await response.json();
            fileSha = data.sha; // Bắt buộc phải có sha để update file
            
            const jsonString = b64DecodeUnicode(data.content);
            configData = JSON.parse(jsonString);
            
            buildUI();
            document.getElementById('uiContainer').style.display = 'block';
            alert("Tải cấu hình thành công!");
        } catch (error) {
            alert(error.message);
        }
    }

    function buildUI() {
        const statesDiv = document.getElementById('statesContainer');
        const timesDiv = document.getElementById('timesContainer');
        statesDiv.innerHTML = ''; timesDiv.innerHTML = '';

        // Tạo UI cho States (Bật/Tắt)
        for (const [key, value] of Object.entries(configData.states)) {
            if (typeof value === "boolean") {
                statesDiv.innerHTML += `
                    <div class="col-md-4 mb-2">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="state_${key}" ${value ? 'checked' : ''} onchange="updateState('${key}')">
                            <label class="form-check-label">${key}</label>
                        </div>
                    </div>`;
            } else if (typeof value === "string") {
                statesDiv.innerHTML += `
                    <div class="col-md-6 mb-2">
                        <label class="form-label">${key}</label>
                        <input type="text" class="form-control" id="state_${key}" value="${value}" onchange="updateState('${key}')">
                    </div>`;
            }
        }

        // Tạo UI cho Times (Số liệu)
        for (const [key, value] of Object.entries(configData.times)) {
            timesDiv.innerHTML += `
                <div class="col-md-4 mb-2">
                    <label class="form-label">${key} (giây)</label>
                    <input type="number" class="form-control" id="time_${key}" value="${value}" onchange="updateTime('${key}')">
                </div>`;
        }
    }

    function updateState(key) {
        const el = document.getElementById(`state_${key}`);
        configData.states[key] = el.type === 'checkbox' ? el.checked : el.value;
    }

    function updateTime(key) {
        configData.times[key] = Number(document.getElementById(`time_${key}`).value);
    }

    async function saveConfig() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const path = document.getElementById('ghPath').value;

        const updatedContent = b64EncodeUnicode(JSON.stringify(configData, null, 2));
        const url = `https://api.github.com/repos/${repo}/contents/${path}`;

        const bodyData = {
            message: "Updated config via Web Panel",
            content: updatedContent,
            sha: fileSha
        };

        try {
            const response = await fetch(url, {
                method: "PUT",
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(bodyData)
            });

            if (!response.ok) throw new Error("Lỗi khi lưu file!");
            
            const result = await response.json();
            fileSha = result.content.sha; // Cập nhật lại sha mới
            alert("Lưu và đồng bộ thành công! Script trong Roblox sẽ cập nhật trong tối đa 30 giây.");
        } catch (error) {
            alert(error.message);
        }
    }
</script>
</body>
</html>
