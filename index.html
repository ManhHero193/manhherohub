<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Địt Nhau Simulator - Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #0f0f13; color: #e0e0e0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 900px; } 
        .card { background-color: #1a1a24; border: 1px solid #2d2d3f; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .form-select, .form-control { background-color: #252535; color: #fff; border: 1px solid #3a3a50; border-radius: 8px; }
        .form-select:focus, .form-control:focus { background-color: #2c2c3e; color: #fff; border-color: #00d2ff; box-shadow: 0 0 0 0.25rem rgba(0, 210, 255, 0.25); }
        .btn-primary { background: linear-gradient(45deg, #0072ff, #00c6ff); border: none; font-weight: bold; }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); border: none; font-weight: bold; }
        .form-check-label { user-select: none; cursor: pointer; padding-left: 5px; font-size: 14px; }
        .form-check-input:checked { background-color: #00c6ff; border-color: #00c6ff; }
        .section-title { border-bottom: 2px solid #2d2d3f; padding-bottom: 10px; margin-bottom: 20px; color: #00c6ff; font-weight: bold; }
        .sub-title { color: #ff007f; font-weight: bold; margin-top: 15px; margin-bottom: 15px; border-bottom: 1px dashed #3a3a50; padding-bottom: 5px; font-size: 16px;}
        .nav-tabs .nav-link { color: #888; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px;}
        .nav-tabs .nav-link.active { color: #00c6ff; background-color: transparent; border-color: transparent; border-bottom: 2px solid #00c6ff; font-weight: bold;}
        .stat-box { background: #252535; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #3a3a50; }
        .stat-title { color: #00c6ff; font-weight: bold; margin-bottom: 10px; font-size: 14px; text-transform: uppercase;}
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 style="color: #00c6ff; font-weight: 800; text-shadow: 0 0 10px rgba(0,198,255,0.5);">HUB CONTROL PANEL</h2>
        <p class="text-secondary">Cloud-based configuration synchronization</p>
    </div>
    
    <div class="card p-4 mb-4">
        <h5 class="section-title"> Configuration Login</h5>
        
        <div id="authSection">
            <div class="mb-3">
                <label class="form-label text-info small fw-bold">Select Game:</label>
                <select id="gameSelect" class="form-select" onchange="hideUI()">
                    <option value="stand">Stand Upright</option>
                    <option value="bss">Bee Swarm Simulator</option>
                </select>
            </div>

            <div class="mb-3" id="keyInputContainer">
                <label class="form-label text-warning small fw-bold">Enter Your Key:</label>
                <div class="input-group">
                    <input type="password" id="userKey" class="form-control text-warning fw-bold" placeholder="E.g., VIP_PLAYER_001">
                    <button class="btn btn-outline-danger" type="button" onclick="clearData()">Clear</button>
                </div>
            </div>
        </div>

        <button id="loadBtn" class="btn btn-primary w-100 py-2 mt-2" onclick="fetchConfig()">
            <span id="loadSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="loadText">CHECK & LOAD CONFIG</span>
        </button>

        <button id="logoutBtn" class="btn btn-danger w-100 py-2 mt-2" style="display: none;" onclick="clearData()">
            LOGOUT / CHANGE KEY
        </button>
        
        <div id="statusMsg" class="mt-3 text-center fw-bold small"></div>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-4 mb-4" id="mainUIBox">
            </div>
        
        <button id="saveBtn" class="btn btn-success w-100 py-3 mb-5 shadow-lg" onclick="saveConfig(false)">
            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="saveText">SAVE CONFIGURATION</span>
        </button>
    </div>
</div>
