<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Địt nhau simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #0d0d12; color: #e2e8f0; padding: 20px; font-family: 'Segoe UI', system-ui, sans-serif; }
        .container { max-width: 950px; } 
        .card { background-color: #151521; border: 1px solid #252538; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-admin { border: 2px dashed #ef4444; background-color: #1a1012; display: none; } /* Ẩn mặc định */
        .form-select, .form-control { background-color: #1f1f30; color: #fff; border: 1px solid #33334c; border-radius: 8px; }
        .form-select:focus, .form-control:focus { background-color: #24243a; color: #fff; border-color: #06b6d4; box-shadow: 0 0 0 0.25rem rgba(6, 182, 212, 0.25); }
        .btn-primary { background: linear-gradient(135deg, #06b6d4, #3b82f6); border: none; font-weight: bold; }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); border: none; font-weight: bold; }
        .btn-danger-admin { background: linear-gradient(135deg, #ef4444, #dc2626); border: none; font-weight: bold; }
        .form-check-label { user-select: none; cursor: pointer; font-size: 14px; color: #cbd5e1; }
        .form-check-input:checked { background-color: #06b6d4; border-color: #06b6d4; }
        .section-title { border-bottom: 2px solid #252538; padding-bottom: 8px; margin-bottom: 18px; color: #06b6d4; font-weight: bold; }
        .section-title-admin { border-bottom: 2px dashed #ef4444; padding-bottom: 8px; margin-bottom: 18px; color: #ef4444; font-weight: bold; }
        .sub-title { color: #f43f5e; font-weight: bold; margin-top: 15px; margin-bottom: 15px; border-bottom: 1px dashed #33334c; padding-bottom: 4px; font-size: 15px;}
        .nav-tabs .nav-link { color: #94a3b8; border: none; border-bottom: 2px solid transparent; }
        .nav-tabs .nav-link.active { color: #06b6d4; background-color: transparent; border-color: transparent; border-bottom: 2px solid #06b6d4; font-weight: bold;}
        .status-box { background-color: #1e1e2f; border: 1px solid #2d2d44; border-radius: 10px; padding: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 style="color: #06b6d4; font-weight: 800; text-shadow: 0 0 12px rgba(6,182,212,0.3);">DATABASE MASTER PANEL</h2>
        <p class="text-secondary small">Địt nhau hub</p>
    </div>

    <div class="card p-4 mb-4">
        <h5 class="section-title"> Truy cập hệ thống bằng Key</h5>
        <div id="authSection">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label text-info small fw-bold">Chọn Game điều khiển:</label>
                    <select id="gameSelect" class="form-select" onchange="hideUI()">
                        <option value="stand">Stand Upright (stand_configs)</option>
                        <option value="bss">Bee Swarm Simulator (configs)</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label text-warning small fw-bold">Nhập mã Key của bạn:</label>
                    <div class="input-group">
                        <input type="password" id="userKey" class="form-control text-warning fw-bold" placeholder="Nhập Key">
                        <button class="btn btn-outline-secondary" type="button" onclick="clearData()">Xoá</button>
                    </div>
                </div>
            </div>
        </div>

        <button id="loadBtn" class="btn btn-primary w-100 py-2" onclick="fetchConfig()">
            <span id="loadSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="loadText">ĐỒNG BỘ & TẢI CẤU HÌNH</span>
        </button>

        <button id="logoutBtn" class="btn btn-secondary w-100 py-2" style="display: none;" onclick="clearData()">
            ĐĂNG XUẤT KHỎI KEY KHỎI HỆ THỐNG
        </button>
        <div id="statusMsg" class="mt-2 text-center fw-bold small"></div>
    </div>

    <div id="adminCard" class="card card-admin p-4 mb-4">
        <h5 class="section-title-admin"> ADMIN Panel</h5>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label text-success small fw-bold">Tên Key :</label>
                <input type="text" id="newTargetKey" class="form-control border-success text-success fw-bold" placeholder="Ví dụ: VipKey_999">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label text-info small fw-bold">Chọn Game áp dụng bộ khung mẫu:</label>
                <select id="adminGameSelect" class="form-select border-info">
                    <option value="stand">Stand Upright (stand_configs)</option>
                    <option value="bss">Bee Swarm Simulator (configs)</option>
                    <option value="both">Khởi tạo cho cả 2 Game</option>
                </select>
            </div>
        </div>
        <button id="adminGenBtn" class="btn btn-danger-admin w-100 py-2 mt-1" onclick="generateUserKey()">
            <span id="adminSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="adminText">GHI DỮ LIỆU KEY MỚI LÊN CLOUD</span>
        </button>
        <div id="adminStatusMsg" class="mt-2 text-center fw-bold small"></div>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-4 mb-4" id="mainUIBox"></div>
        <button id="saveBtn" class="btn btn-success w-100 py-3 mb-5 shadow" onclick="saveConfig()">
            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="saveText"> Update config</span>
        </button>
    </div>
</div>
