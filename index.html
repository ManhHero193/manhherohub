<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; }
        .container { max-width: 600px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .form-select, .form-control { background-color: #2d2d2d; color: white; border: 1px solid #444; }
        .form-select:focus, .form-control:focus { background-color: #3d3d3d; color: white; border-color: #0dcaf0; box-shadow: none; }
        .form-check-label { user-select: none; cursor: pointer; }
        .form-check-input:checked { background-color: #198754; border-color: #198754; }
    </style>
</head>
<body>
<div class="container">
    <h2 class="text-center text-info mb-4 fw-bold">Bee Swarm Control Panel</h2>
    
    <div class="card p-4 rounded-4">
        <h5 class="mb-3">Cấu Hình GitHub</h5>
        <div class="input-group mb-3">
            <input type="password" id="ghToken" class="form-control" placeholder="Dán GitHub Personal Access Token...">
            <button class="btn btn-outline-danger" type="button" onclick="clearToken()" title="Xóa Token đã lưu">Xóa</button>
        </div>
        <button id="loadBtn" class="btn btn-info w-100 fw-bold" onclick="fetchConfig()">
            <span id="loadSpinner" class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
            <span id="loadText">Tải Cấu Hình</span>
        </button>
        <div id="errorMsg" class="text-danger mt-3 small d-none text-center fw-bold"></div>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-4 rounded-4">
            <h4 class="mb-4 pb-2 border-bottom border-secondary">Cài đặt chính</h4>
            <div id="settingsContainer"></div>
        </div>
        <button id="saveBtn" class="btn btn-success w-100 btn-lg fw-bold shadow mb-5" onclick="saveConfig()">
            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
            <span id="saveText">LƯU & ĐỒNG BỘ</span>
        </button>
    </div>
</div>

<script>
    // Biến toàn cục
    window.fileSha = ''; 
    window.configData = {};
    
    const repoPath = "ManhHero193/manhherohub/contents/ConfigBss.loncho";
    const fields = ["Sunflower Field", "Mushroom Field", "Clover Field", "Blue Flower Field", "Spider Field", "Strawberry Field", "Bamboo Field", "Pineapple Patch", "Cactus Field", "Pumpkin Patch", "Pine Tree Forest", "Rose Field", "Mountain Top Field", "Coconut Field", "Pepper Patch"];
    const sprinklers = ["Sprinkler Builder", "Silver Soakers", "Golden Gushers", "Diamond Drenchers", "The Supreme Saturator"];

    const b64DecodeUnicode = str => decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    const b64EncodeUnicode = str => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));

    // Tự động tải Token đã lưu khi mở trang
    document.addEventListener("DOMContentLoaded", () => {
        const savedToken = localStorage.getItem("ghBssToken");
        if (savedToken) {
            document.getElementById("ghToken").value = savedToken;
        }
    });

    // Hàm xóa token
    function clearToken() {
        localStorage.removeItem("ghBssToken");
        document.getElementById("ghToken").value = "";
        document.getElementById('uiContainer').style.display = 'none';
    }

    function showError(msg) {
        const err = document.getElementById('errorMsg');
        err.textContent = msg;
        err.classList.remove('d-none');
    }

    function toggleButtonState(btnId, spinnerId, textId, isLoading, originalText) {
        document.getElementById(btnId).disabled = isLoading;
        document.getElementById(spinnerId).classList.toggle('d-none', !isLoading);
        document.getElementById(textId).textContent = isLoading ? ' Đang xử lý...' : originalText;
    }

    // Các hàm cập nhật có thêm bảo vệ chống lỗi
    window.updateSelectValue = function(key, val) {
        if(window.configData && window.configData.states) {
            window.configData.states[key] = val;
        }
    };

    window.updateToggleValue = function(key, isChecked) {
        if(window.configData && window.configData.states) {
            window.configData.states[key] = isChecked;
        }
    };

    async function fetchConfig() {
        const token = document.getElementById('ghToken').value.trim();
        if (!token) return showError("Vui lòng nhập Token!");
        
        document.getElementById('errorMsg').classList.add('d-none');
        toggleButtonState('loadBtn', 'loadSpinner', 'loadText', true, 'Tải Cấu Hình');

        try {
            const response = await fetch(`https://api.github.com/repos/${repoPath}?timestamp=${Date.now()}`, { 
                headers: { 
                    'Authorization': `token ${token}`, 
                    'Accept': 'application/vnd.github.v3+json',
                    'Cache-Control': 'no-cache'
                } 
            });
            
            if (!response.ok) throw new Error(`Lỗi kết nối API: ${response.status} (Kiểm tra lại Token hoặc Repo)`);
            
            const data = await response.json();
            window.fileSha = data.sha;
            
            // Bắt lỗi nếu file trên Github bị hỏng định dạng JSON
            try {
                window.configData = JSON.parse(b64DecodeUnicode(data.content));
            } catch (e) {
                throw new Error("Lỗi đọc file: Dữ liệu trên GitHub không phải là JSON hợp lệ.");
            }

            // Bắt lỗi nếu cấu trúc JSON không đúng chuẩn
            if (!window.configData || !window.configData.states) {
                throw new Error("Cấu trúc file JSON không hợp lệ (Thiếu object 'states').");
            }
            
            // Lưu token lại để lần sau không cần nhập
            localStorage.setItem("ghBssToken", token);
            
            buildUI();
            document.getElementById('uiContainer').style.display = 'block';
        } catch (error) {
            showError(error.message);
            document.getElementById('uiContainer').style.display = 'none';
        } finally {
            toggleButtonState('loadBtn', 'loadSpinner', 'loadText', false, 'Tải Cấu Hình');
        }
    }

    function buildUI() {
        const container = document.getElementById('settingsContainer');
        container.innerHTML = '';

        const createSelect = (label, options, currentValue, key) => {
            return `
                <div class="mb-3">
                    <label class="form-label text-info">${label}</label>
                    <select class="form-select" onchange="window.updateSelectValue('${key}', this.value)">
                        ${options.map(opt => `<option value="${opt}" ${currentValue === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                    </select>
                </div>`;
        };

        container.innerHTML += createSelect("Cánh đồng (Field):", fields, window.configData.states.selectedField, "selectedField");
        container.innerHTML += createSelect("Loại vòi phun (Sprinkler):", sprinklers, window.configData.states.sprinklerType, "sprinklerType");

        const toggleBox = document.createElement('div');
        toggleBox.className = "mt-4 pt-3 border-top border-secondary";
        
        for (const [key, value] of Object.entries(window.configData.states)) {
            if (["webhookUrl", "selectedField", "sprinklerType"].includes(key)) continue;
            
            const div = document.createElement('div');
            div.className = 'form-check form-switch mb-2';
            
            div.innerHTML = `
                <input class="form-check-input" type="checkbox" id="chk_${key}" ${value ? 'checked' : ''} onchange="window.updateToggleValue('${key}', this.checked)">
                <label class="form-check-label" for="chk_${key}">${key}</label>
            `;
            toggleBox.appendChild(div);
        }
        container.appendChild(toggleBox);
    }

    async function saveConfig() {
        const token = document.getElementById('ghToken').value.trim();
        toggleButtonState('saveBtn', 'saveSpinner', 'saveText', true, 'LƯU & ĐỒNG BỘ');

        try {
            const response = await fetch(`https://api.github.com/repos/${repoPath}`, {
                method: "PUT",
                headers: { 
                    'Authorization': `token ${token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ 
                    message: "Cập nhật cấu hình qua BSS Control Panel", 
                    content: b64EncodeUnicode(JSON.stringify(window.configData, null, 4)), 
                    sha: window.fileSha 
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || `Lỗi API: ${response.status}`);
            }
            
            const data = await response.json();
            window.fileSha = data.content.sha; 
            
            alert("Đã lưu thành công lên Github! (Lưu ý: Nếu dùng link raw, Tool/Macro có thể mất 3-5 phút mới nhận cấu hình mới do GitHub cache).");
        } catch (error) {
            alert("Lưu thất bại: " + error.message);
        } finally {
            toggleButtonState('saveBtn', 'saveSpinner', 'saveText', false, 'LƯU & ĐỒNG BỘ');
        }
    }
</script>
</body>
</html>
