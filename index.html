<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Web Panel - Key Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f13; color: #e0e0e0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 650px; }
        .card { background-color: #1a1a24; border: 1px solid #2d2d3f; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .form-select, .form-control { background-color: #252535; color: #fff; border: 1px solid #3a3a50; border-radius: 8px; }
        .form-select:focus, .form-control:focus { background-color: #2c2c3e; color: #fff; border-color: #00d2ff; box-shadow: 0 0 0 0.25rem rgba(0, 210, 255, 0.25); }
        .btn-primary { background: linear-gradient(45deg, #0072ff, #00c6ff); border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .form-check-label { user-select: none; cursor: pointer; padding-left: 5px; font-size: 15px; }
        .form-check-input:checked { background-color: #00c6ff; border-color: #00c6ff; }
        .section-title { border-bottom: 2px solid #2d2d3f; padding-bottom: 10px; margin-bottom: 20px; color: #00c6ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h2 style="color: #00c6ff; font-weight: 800; text-shadow: 0 0 10px rgba(0,198,255,0.5);">BSS CONTROL PANEL</h2>
        <p class="text-secondary">Cloud-based configuration synchronization</p>
    </div>
    
    <div class="card p-4 mb-4">
        <h5 class="section-title">🔑 Configuration Login</h5>
        
        <div class="mb-3">
            <label class="form-label text-warning small fw-bold">Enter Your Key:</label>
            <div class="input-group">
                <input type="text" id="userKey" class="form-control text-warning fw-bold" placeholder="E.g., VIP_PLAYER_001">
                <button class="btn btn-outline-danger" type="button" onclick="clearData()">Logout</button>
            </div>
        </div>

        <button id="loadBtn" class="btn btn-primary w-100 py-2 mt-2" onclick="fetchConfig()">
            <span id="loadSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="loadText">CHECK & LOAD CONFIG</span>
        </button>
        
        <div id="statusMsg" class="mt-3 text-center fw-bold small"></div>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-4 mb-4">
            <h5 class="section-title">⚙️ Function Settings</h5>
            <div id="settingsContainer" class="row"></div>
        </div>
        
        <button id="saveBtn" class="btn btn-success w-100 py-3 mb-5 shadow-lg" onclick="saveConfig()">
            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="saveText">SAVE CONFIGURATION</span>
        </button>
    </div>
</div>
