<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BSS Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #1e1e1e; color: white; padding: 20px; } .card { background-color: #2d2d2d; border: none; margin-bottom: 20px; }</style>
</head>
<body>
<div class="container">
    <h2 class="text-center text-primary mb-4">Bee Swarm Control Panel</h2>
    
    <div class="card p-3">
        <h5>GitHub Config</h5>
        <input type="password" id="ghToken" class="form-control mb-2" placeholder="Dán GitHub Token tại đây">
        <button class="btn btn-info w-100" onclick="fetchConfig()">Tải Cấu Hình</button>
    </div>

    <div id="uiContainer" style="display: none;">
        <div class="card p-3">
            <h4>Cài đặt chính</h4>
            <div id="settingsContainer"></div>
        </div>
        <button class="btn btn-success w-100 btn-lg" onclick="saveConfig()">LƯU & ĐỒNG BỘ</button>
    </div>
</div>

<script>
    let fileSha, configData;
    const fields = ["Sunflower Field", "Mushroom Field", "Clover Field", "Blue Flower Field", "Spider Field", "Strawberry Field", "Bamboo Field", "Pineapple Patch", "Cactus Field", "Pumpkin Patch", "Pine Tree Forest", "Rose Field", "Mountain Top Field", "Coconut Field", "Pepper Patch"];
    const sprinklers = ["Sprinkler Builder", "Silver Soakers", "Golden Gushers", "Diamond Drenchers", "The Supreme Saturator"];

    // Hàm decode/encode để xử lý JSON
    const b64DecodeUnicode = str => decodeURIComponent(Array.prototype.map.call(atob(str), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    const b64EncodeUnicode = str => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));

    async function fetchConfig() {
        const token = document.getElementById('ghToken').value;
        const response = await fetch(`https://api.github.com/repos/ManhHero193/manhherohub/contents/ConfigBss.loncho`, { headers: { 'Authorization': `token ${token}` } });
        const data = await response.json();
        fileSha = data.sha;
        configData = JSON.parse(b64DecodeUnicode(data.content));
        buildUI();
        document.getElementById('uiContainer').style.display = 'block';
    }

    function buildUI() {
        const container = document.getElementById('settingsContainer');
        container.innerHTML = '';

        // Tạo Dropdown cho Field
        container.innerHTML += `<label>Cánh đồng:</label><select class="form-select mb-3" id="fieldSelect" onchange="configData.states.selectedField = this.value">
            ${fields.map(f => `<option value="${f}" ${configData.states.selectedField === f ? 'selected' : ''}>${f}</option>`).join('')}
        </select>`;

        // Tạo Dropdown cho Sprinkler
        container.innerHTML += `<label>Loại Sprinkler:</label><select class="form-select mb-3" id="sprinklerSelect" onchange="configData.states.sprinklerType = this.value">
            ${sprinklers.map(s => `<option value="${s}" ${configData.states.sprinklerType === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select>`;

        // Hiển thị các Toggle khác (loại bỏ webhookUrl)
        for (const [key, value] of Object.entries(configData.states)) {
            if (key === "webhookUrl" || key === "selectedField" || key === "sprinklerType") continue;
            container.innerHTML += `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="${key}" ${value ? 'checked' : ''} onchange="configData.states['${key}'] = this.checked"> <label class="form-check-label">${key}</label></div>`;
        }
    }

    async function saveConfig() {
        const token = document.getElementById('ghToken').value;
        await fetch(`https://api.github.com/repos/ManhHero193/manhherohub/contents/ConfigBss.loncho`, {
            method: "PUT",
            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Update via Web", content: b64EncodeUnicode(JSON.stringify(configData, null, 2)), sha: fileSha })
        });
        alert("Đã lưu thành công!");
    }
</script>
</body>
</html>
